# inference-perf/values.yaml
job:
  image:
    repository: quay.io/inference-perf/inference-perf
    tag: "" # Defaults to .Chart.AppVersion
  nodeSelector: {}
  serviceAccountName: "workload-identity-k8s-sa"
  # Example resources:
  # resources:
  #   requests:
  #     cpu: "1"
  #     memory: "4Gi"
  #   limits:
  #     cpu: "2"
  #     memory: "8Gi"
  resources: {}

logLevel: INFO

# A GCS bucket path that points to the dataset file.
# The file will be copied from this path to the local file system
# at /gcsDataset/gcs-dataset.json for use during the run.
# NOTE: For this dataset to be used, config.data.path must also be explicitly set to /gcsDataset/gcs-dataset.json.
# Format: bucket-name/folder/to/dataset/file
gcsPath: ""

# An S3 bucket path that points to the dataset file.
# The file will be copied from this path to the local file system
# at /s3Dataset/s3-dataset.json for use during the run.
# NOTE: For this dataset to be used, config.data.path must also be explicitly set to /s3Dataset/s3-dataset.json.
# Format: bucket-name/folder/to/dataset/file
s3Path: ""

# Optional Token configuration for Hugging Face authentication.
# hfSecret: Configures a pre-existing Kubernetes Secret.
# hfToken: Creates a new kubernetes secret with the specified token.
# If both specified, 'hfSecret' takes precedence over 'hfToken'.
token:
  hfSecret:
    name: "" # The name of the existing Secret (e.g., 'my-hf-secret').
    key: ""  # The key within the Secret that holds the token value (e.g., 'token' or 'hf-token').
  hfToken: ""

config:
  api:
    type: completion
    streaming: true
  data:
    type: random
    path: null
    input_distribution:
      min: 3000
      max: 3000
      mean: 3000
      std_dev: 0
      total_count: 12120
    output_distribution:
      min: 300
      max: 300
      mean: 300
      std_dev: 0
      total_count: 12120
    shared_prefix: null
    trace: null
  load:
    type: concurrent
    interval: 3.0
    stages:
      - num_requests: 160
        concurrency_level: 8
      - num_requests: 320
        concurrency_level: 16
      - num_requests: 640
        concurrency_level: 32
      - num_requests: 1000
        concurrency_level: 64
      - num_requests: 2000
        concurrency_level: 128
      - num_requests: 3000
        concurrency_level: 256
      - num_requests: 5000
        concurrency_level: 512
    sweep: null
    num_workers: 50
    worker_max_concurrency: 0
    worker_max_tcp_connections: 2500
    trace: null
    circuit_breakers: [ ]
    request_timeout: null
    lora_traffic_split: null
  metrics: null
  report:
    request_lifecycle:
      summary: true
      per_stage: true
      per_request: true
      per_adapter: true
      per_adapter_stage: false
      percentiles:
        - 0.1
        - 1.0
        - 5.0
        - 10.0
        - 25.0
        - 50.0
        - 75.0
        - 90.0
        - 95.0
        - 99.0
        - 99.9
    prometheus:
      summary: true
      per_stage: false
  storage:
    local_storage:
      path: /reports/prefill-heavy
      report_file_prefix: null
  server:
    type: vllm
    model_name: openai/gpt-oss-120b
    base_url: http://0.0.0.0
    ignore_eos: true
  tokenizer: null
  circuit_breakers: null
